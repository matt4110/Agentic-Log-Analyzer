# Below are the config settings for the rsyslog client
# These settings send the selected log files to the server
#
# /etc/rsyslog.d/99-log-forwarding.conf
# Remote log forwarding to central log server
# Sends: auth.log, audit.log, ufw.log, safeline WAF access logs
# Target: 000.000.000.000:514 (TCP)
# =============================================================
# -------------------------------------------------------
# MODULES
# -------------------------------------------------------
module(load="imfile")
# -------------------------------------------------------
# INPUT: Authentication logs
# -------------------------------------------------------
input(type="imfile"
      File="/var/log/auth.log"
      Tag="auth"
      Severity="info"
      Facility="auth"
      PersistStateInterval="10")
# -------------------------------------------------------
# INPUT: Linux Audit logs (auditd)
# -------------------------------------------------------
input(type="imfile"
      File="/var/log/audit/audit.log"
      Tag="auditd"
      Severity="info"
      Facility="local6"
      PersistStateInterval="10")
# -------------------------------------------------------
# INPUT: UFW Firewall logs
# -------------------------------------------------------
input(type="imfile"
      File="/var/log/ufw.log"
      Tag="ufw"
      Severity="info"
      Facility="local5"
      PersistStateInterval="10")
# -------------------------------------------------------
# INPUT: SafeLine WAF / Nginx Access logs
# -------------------------------------------------------
input(type="imfile"
      File="/data/safeline/logs/nginx/safeline/accesslog_1"
      Tag="safeline-waf"
      Severity="info"
      Facility="local7"
      PersistStateInterval="10")
# -------------------------------------------------------
# OUTPUT: Forward all tagged sources to log server
# Uses TCP for reliable delivery with a retry/disk queue
# Note: imfile appends ':' to tags, so we use startswith
# -------------------------------------------------------
if ($syslogtag startswith 'auth' or
    $syslogtag startswith 'auditd' or
    $syslogtag startswith 'ufw' or
    $syslogtag startswith 'safeline-waf')
then {
    action(type="omfwd"
           Target="000.000.000.000"
           Port="514"
           Protocol="tcp"
           # Queue messages to disk if server is unreachable
           queue.type="LinkedList"
           queue.filename="fwd-queue"
           queue.maxdiskspace="100m"
           queue.saveonshutdown="on"
           action.resumeRetryCount="-1"
           action.resumeInterval="30")
    stop
}