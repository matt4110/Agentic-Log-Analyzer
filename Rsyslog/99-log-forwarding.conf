# Below are the config settings for the rsyslog client
# These settings send the selected log files to the server
#
# /etc/rsyslog.d/99-log-forwarding.conf
# Remote log forwarding to central log server
# Sends: auth.log, audit.log, ufw.log, safeline WAF access logs
# Target: 192.168.6.2:514 (TCP)
# =============================================================

# -------------------------------------------------------
# MODULES
# -------------------------------------------------------
module(load="imfile")

# -------------------------------------------------------
# RULESET: Forward directly to log server, bypassing
# default rules (prevents re-injection loops)
# -------------------------------------------------------
ruleset(name="forward-to-server") {
    action(type="omfwd"
           Target="192.168.6.2"
           Port="514"
           Protocol="tcp"
           queue.type="LinkedList"
           queue.filename="fwd-queue"
           queue.maxdiskspace="100m"
           queue.saveonshutdown="on"
           action.resumeRetryCount="-1"
           action.resumeInterval="30")
    stop
}

# -------------------------------------------------------
# INPUT: Authentication logs
# -------------------------------------------------------
input(type="imfile"
      File="/var/log/auth.log"
      Tag="auth"
      Severity="info"
      Facility="auth"
      PersistStateInterval="10"
      Ruleset="forward-to-server")

# -------------------------------------------------------
# INPUT: Linux Audit logs (auditd)
# -------------------------------------------------------
input(type="imfile"
      File="/var/log/audit/audit.log"
      Tag="auditd"
      Severity="info"
      Facility="local6"
      PersistStateInterval="10"
      Ruleset="forward-to-server")

# -------------------------------------------------------
# INPUT: UFW Firewall logs
# -------------------------------------------------------
input(type="imfile"
      File="/var/log/ufw.log"
      Tag="ufw"
      Severity="info"
      Facility="local5"
      PersistStateInterval="10"
      Ruleset="forward-to-server")

# -------------------------------------------------------
# INPUT: SafeLine WAF / Nginx Access logs
# -------------------------------------------------------
input(type="imfile"
      File="/data/safeline/logs/nginx/safeline/accesslog_1"
      Tag="safeline-waf"
      Severity="info"
      Facility="local7"
      PersistStateInterval="10"
      Ruleset="forward-to-server")